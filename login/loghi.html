<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bibliotech | Login</title>

    <link rel="stylesheet" href="login.css" />

    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="shortcut icon"
      href="Bibliotech---Wanda-Monica-main/ChatGPT Image 4 de mar. de 2026, 13_26_16.png"
      type="image/x-icon"
    />
  </head>

  <body>
    <header><h1>Bibliotech</h1></header>

    <div class="box">
      <div class="card">
        <h3>Login</h3>

        <form action="inicio.html">
          <label>Nome</label>
          <input type="text" placeholder="Digite seu nome" required />

          <label>Email</label>
          <input type="email" placeholder="Digite seu email" required />

          <label>Senha</label>
          <input type="password" placeholder="Digite sua senha" required />
          <button type="submit">Entrar</button>
        </form>

        <div class="divider">ou</div>

        <div
          id="g_id_onload"
          data-client_id="524209666837-pb5ka28lajcka858trlc3gltggj0suot.apps.googleusercontent.com"
          data-callback="handleCredentialResponse"
        ></div>

        <div
          class="g_id_signin"
          data-type="standard"
          data-size="large"
          data-theme="outline"
          data-text="signin_with"
          data-shape="rectangular"
          data-logo_alignment="left"
        ></div>

        <div id="user-info"></div>

        <div class="cada">
          <p>não tem uma conta?</p>
          <a href="cadastro.html"> Clique aqui</a>
        </div>
      </div>
    </div>

    <script src="login.js"></script>
  </body>
</html>
