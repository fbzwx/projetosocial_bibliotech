<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bibliotech | Login</title>

    <link rel="stylesheet" href="login.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="shortcut icon"
      href="Bibliotech---Wanda-Monica-main/ChatGPT Image 4 de mar. de 2026, 13_26_16.png"
      type="image/x-icon"
    />
  </head>

  <body>
    <header><h1>Bibliotech</h1></header>

    <div class="box">
      <div class="card">
        <h3>Login</h3>

        <form onsubmit="entrar(event)">
          <label>Nome</label>
          <input type="text" id="nome" placeholder="Digite seu nome" required />

          <label>Email</label>
          <input
            type="email"
            id="email"
            placeholder="Digite seu email"
            required
          />

          <label>Senha</label>
          <input
            type="password"
            id="senha"
            placeholder="Digite sua senha"
            required
          />
          <p id="loginError" style="color:red; font-size:14px; margin-top:5px;"></p>
          
          <button type="submit">Entrar</button>
        </form>

        <div class="divider">ou</div>

        <button type="button" onclick="googleLogin()">Entrar com Google</button>

        <div id="user-info"></div>

        <div class="cada">
          <p>não tem uma conta?</p>
          <a href="../inicio/index.html"> Clique aqui</a>
        </div>
      </div>
    </div>

    <script type="module" src="login.js"></script>
  </body>
</html>
